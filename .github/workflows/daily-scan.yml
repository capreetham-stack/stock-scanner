name: Daily NSE Scan

on:
  schedule:
    # 04:12 UTC = 09:42 IST, Monday-Friday (Morning scan off-peak)
    - cron: "12 4 * * 1-5"
    # 06:43 UTC = 12:13 IST, Monday-Friday (Mid-day scan off-peak)
    - cron: "43 6 * * 1-5"
    # 10:13 UTC = 15:43 IST, Monday-Friday (Evening follow-up off-peak)
    - cron: "13 10 * * 1-5"
    # 04:28 to 09:28 UTC = 09:58 to 14:58 IST hourly (Off-peak!)
    - cron: "28 4-9 * * 1-5"
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_type:
        description: "Which scan to run"
        required: false
        default: "morning"
        type: choice
        options:
          - morning
          - midday
          - evening
          - hourly

permissions:
  contents: read

jobs:
  run-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare runtime folders
        run: |
          mkdir -p logs output .github/secrets
          {
            echo "Daily NSE Scan workflow started"
            echo "Event: ${{ github.event_name }}"
            echo "Schedule: ${{ github.event.schedule || 'n/a' }}"
            echo "Ref: ${{ github.ref_name }}"
          } > logs/github-actions.log

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip 2>&1 | tee -a logs/github-actions.log
          pip install -r requirements.txt 2>&1 | tee -a logs/github-actions.log
          test ${PIPESTATUS[0]} -eq 0

      - name: Create credentials file from secret
        env:
          CREDS_1: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          CREDS_2: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          set -euo pipefail
          FINAL_CREDS="${CREDS_1:-$CREDS_2}"
          if [ -z "$FINAL_CREDS" ]; then
            echo "Missing secret: GOOGLE_APPLICATION_CREDENTIALS or JSON" | tee -a logs/github-actions.log
            exit 1
          fi
          printf "%s" "$FINAL_CREDS" > .github/secrets/google-service-account.json
          python -m json.tool .github/secrets/google-service-account.json > /dev/null 2>> logs/github-actions.log
          echo "Credentials JSON validated successfully" >> logs/github-actions.log

      - name: Run morning scanner or evening follow-up
        env:
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
          GOOGLE_SHEET_KEY: ${{ secrets.GOOGLE_SHEET_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: .github/secrets/google-service-account.json
        run: |
          set -euo pipefail
          if [ -z "$GOOGLE_SHEET_URL" ] && [ -z "${GOOGLE_SHEET_KEY:-}" ]; then
            echo "Missing secret: GOOGLE_SHEET_URL or GOOGLE_SHEET_KEY" | tee -a logs/github-actions.log
            exit 1
          fi
          echo "Google Sheet Target is present" >> logs/github-actions.log
          RUN_TYPE="${{ github.event.inputs.run_type }}"
          if [ "${{ github.event.schedule }}" = "13 10 * * 1-5" ] || [ "$RUN_TYPE" = "evening" ]; then
            echo "Running evening follow-up..." >> logs/github-actions.log
            python scripts/evening_followup.py 2>&1 | tee -a logs/github-actions.log || true
            echo "Appending evening movement section to morning worksheet..." >> logs/github-actions.log
            python scripts/evening_append_to_morning.py 2>&1 | tee -a logs/github-actions.log
          elif [ "${{ github.event.schedule }}" = "43 6 * * 1-5" ] || [ "$RUN_TYPE" = "midday" ]; then
            echo "Running mid-day scanner..." >> logs/github-actions.log
            python main.py --sync-gsheet --plain --watchlist NIFTY500 2>&1 | tee -a logs/github-actions.log
          elif [ "${{ github.event.schedule }}" = "28 4-9 * * 1-5" ] || [ "$RUN_TYPE" = "hourly" ]; then
            echo "Running hourly scanner..." >> logs/github-actions.log
            python main.py --sync-gsheet --plain --watchlist NIFTY500 --run-type hourly 2>&1 | tee -a logs/github-actions.log
          else
            echo "Running morning scanner..." >> logs/github-actions.log
            python main.py --sync-gsheet --plain --watchlist NIFTY500 2>&1 | tee -a logs/github-actions.log
          fi
          test ${PIPESTATUS[0]} -eq 0

      - name: Upload scan output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nse-scan-output
          path: |
            logs/github-actions.log
            output/buy_signals.csv
            output/buy_signals.json
            logs/scanner.log
          if-no-files-found: warn
