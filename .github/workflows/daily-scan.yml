name: Daily NSE Scan

on:
  schedule:
    # 03:30 UTC = 09:00 IST, Monday-Friday
    - cron: "30 3 * * 1-5"
    # 11:30 UTC = 17:00 IST, Monday-Friday
    - cron: "30 11 * * 1-5"
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_type:
        description: "Which scan to run"
        required: false
        default: "morning"
        type: choice
        options:
          - morning
          - evening

permissions:
  contents: read

jobs:
  run-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare runtime folders
        run: |
          mkdir -p logs output .github/secrets
          {
            echo "Daily NSE Scan workflow started"
            echo "Event: ${{ github.event_name }}"
            echo "Schedule: ${{ github.event.schedule || 'n/a' }}"
            echo "Ref: ${{ github.ref_name }}"
          } > logs/github-actions.log

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip 2>&1 | tee -a logs/github-actions.log
          pip install -r requirements.txt 2>&1 | tee -a logs/github-actions.log
          test ${PIPESTATUS[0]} -eq 0

      - name: Create credentials file from secret
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          set -euo pipefail
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            echo "Missing secret: GOOGLE_APPLICATION_CREDENTIALS" | tee -a logs/github-actions.log
            echo "Missing secret: GOOGLE_APPLICATION_CREDENTIALS"
            exit 1
          fi
          printf "%s" "$GOOGLE_APPLICATION_CREDENTIALS" > .github/secrets/google-service-account.json
          python -m json.tool .github/secrets/google-service-account.json > /dev/null 2>> logs/github-actions.log
          echo "Credentials JSON validated successfully" >> logs/github-actions.log

      - name: Run morning scanner or evening follow-up
        env:
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
          GOOGLE_APPLICATION_CREDENTIALS: .github/secrets/google-service-account.json
        run: |
          set -euo pipefail
          if [ -z "$GOOGLE_SHEET_URL" ]; then
            echo "Missing secret: GOOGLE_SHEET_URL" | tee -a logs/github-actions.log
            echo "Missing secret: GOOGLE_SHEET_URL"
            exit 1
          fi
          echo "GOOGLE_SHEET_URL is present" >> logs/github-actions.log
          RUN_TYPE="${{ github.event.inputs.run_type }}"
          if [ "${{ github.event.schedule }}" = "30 11 * * 1-5" ] || [ "$RUN_TYPE" = "evening" ]; then
            echo "Running evening follow-up..." >> logs/github-actions.log
            python scripts/evening_followup.py 2>&1 | tee -a logs/github-actions.log
            echo "Appending evening movement section to morning worksheet..." >> logs/github-actions.log
            python scripts/evening_append_to_morning.py 2>&1 | tee -a logs/github-actions.log
          else
            echo "Running morning scanner..." >> logs/github-actions.log
            python main.py --sync-gsheet --plain --watchlist NIFTY500 2>&1 | tee -a logs/github-actions.log
          fi
          test ${PIPESTATUS[0]} -eq 0

      - name: Upload scan output artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nse-scan-output
          path: |
            logs/github-actions.log
            output/buy_signals.csv
            output/buy_signals.json
            logs/scanner.log
          if-no-files-found: warn
